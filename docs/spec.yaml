openapi: 3.0.3
info:
  title: "Event Central"
  description: "Centralized API to generate e-invoices (E-Rechnungen) for events, track payments, manage collections and generate reportings"
  version: 1.0.0
  contact:
    name: "Richard Chojetzki"
    email: "chojetzki@tema.de"
  license:
    name: "Proprietary"

servers:
  - url: "http://localhost:7435"
    description: "Local Development Server"
  - url: "https://eu-01.event-central.tema-dev.de"
    description: "Primary EU Node (FRA)"
  - url: "https://eu-02.event-central.tema-dev.de"
    description: "Secondary EU Node (TBD)"

tags:
  - name: "Auth"
    description: "Authentication"

paths:
  /auth/token:
    post:
      tags: ["Auth"]
      operationId: "authToken"
      summary: "OAuth 2.0 Token"
      description: >
        Exchange credentials or token for an access token pair; supports the
        following grants: password, refresh_token and
        http://auth0.com/oauth/grant-type/passwordless/otp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: "Authentication successful"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        default:
          $ref: "#/components/responses/AuthError"

  /auth/revoke:
    post:
      tags: ["Auth"]
      operationId: "authRevoke"
      summary: "OAuth 2.0 Revoke Token"
      description: "Revoke a refresh token, e.g. logout"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRevokeRequest"
      responses:
        "200":
          description: "Logout successful"
        default:
          $ref: "#/components/responses/AuthError"

  /auth/userinfo:
    get:
      tags: ["Auth"]
      operationId: "authUserinfo"
      summary: "OAuth 2.0 Userinfo"
      description: "Get basic data about the authenticated user"
      responses:
        "200":
          description: "Userinfo fetched"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserinfoResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: []

  /auth/passwordless/start:
    post:
      tags: ["Auth"]
      operationId: "authPasswordlessStart"
      summary: "Start passwordless login"
      description: "Send an email or sms to start the passwordless login flow"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordlessStartRequest"
      responses:
        "200":
          description: "Data received, opaque response to not leak user inventory"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPasswordlessStartResponse"
        default:
          $ref: "#/components/responses/Error"

  /auth/password-reset/start:
    post:
      tags: ["Auth"]
      operationId: "authPasswordResetStart"
      summary: "Start password reset process"
      description: "Send an email or sms to start the password reset flow"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetStartRequest"
      responses:
        "200":
          description: "Data received, opaque response to not leak user inventory"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPasswordResetStartResponse"
        default:
          $ref: "#/components/responses/Error"

  /auth/password-reset/confirm:
    post:
      tags: ["Auth"]
      operationId: "authPasswordResetConfirm"
      summary: "Finalize password reset"
      description: "Set the new password, invalidate all current access and refresh tokens"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetConfirmRequest"
      responses:
        "200":
          description: "Password reset successful, new password set"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthPasswordResetConfirmResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/users:
    get:
      tags: ["Users"]
      operationId: "listUsers"
      summary: "List users"
      description: "Get a list of all users, response is not paged"
      responses:
        "200":
          description: "List of all users, ordered by date created desc"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsersListResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]
    post:
      tags: ["Users"]
      operationId: "createUser"
      summary: "Create user"
      description: "Create a new user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsersCreateRequest"
      responses:
        "201":
          description: "User successfully created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: ["Users"]
      operationId: "getUser"
      summary: "Get a user"
      description: "Get all details of a user"
      responses:
        "200":
          description: "Basic user data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]
    post:
      tags: ["Users"]
      operationId: "updateUser"
      summary: "Update user"
      description: "Set basic data for a user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateRequest"
      responses:
        "200":
          description: "User has been successfully updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]
    delete:
      tags: ["Users"]
      operationId: "deleteUser"
      summary: "Delete user"
      description: "Soft-delete a user (sets the user to deleted)"
      responses:
        "200":
          description: "User has been successfully deleted"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}/history:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: ["Users"]
      operationId: "getUserHistory"
      summary: "History of a user"
      description: "Get a list of all updates that have been done to a user"
      responses:
        "200":
          description: "User change history"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserHistoryResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]

  /api/v1/users/{userId}/restore:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      tags: ["Users"]
      operationId: "restoreUser"
      summary: "Restore a user"
      description: "Restore a soft-deleted user account"
      responses:
        "200":
          description: "Restored user"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}/auth:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: ["Users"]
      operationId: "listUserAuth"
      summary: "Authentication configuration for a user"
      description: "Get a list of all auth methods configured for a user"
      responses:
        "200":
          description: "List of configured auth methods"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthListResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]
    post:
      tags: ["Users"]
      operationId: "createUserAuth"
      summary: "Set up an auth method for a user"
      description: "Create a new auth method for a user. Supported methods are api-token, password, passwordless or otp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAuthCreateRequest"
      responses:
        "200":
          description: "Auth method has been successfully set up"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}/auth/{userAuthId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
      - $ref: "#/components/parameters/UserAuthId"
    get:
      tags: ["Users"]
      operationId: "getUserAuth"
      summary: "Get authentication method"
      description: "Get the configuration for an auth method"
      responses:
        "200":
          description: "Configuration data for an auth method"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]
    delete:
      tags: ["Users"]
      operationId: "deleteUserAuth"
      summary: "Disable an authentication method"
      description: >
        Authentication methods can never be updated. Therefore deleting and
        creating a new one is the only way to alter a user's auth, so history
        is preserved by default.
      responses:
        "200":
          description: "Auth method has been successfully disabled"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAuthResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}/scopes:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: ["Users"]
      operationId: "listUserScopes"
      summary: "Scopes the user has access to"
      description: "List all scopes the user has access to with metadata: e.g. start and end times"
      responses:
        "200":
          description: "List of scopes the user has access to"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserScopesListResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]
    post:
      tags: ["Users"]
      operationId: "setUserScopes"
      summary: "Set access scopes"
      description: >
        Update the scopes a user has access to. 
        Returns the full list of scopes (including the history) as the GET endpoint does. 
        Simply replace the full value when displaying this in the frontend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserScopesUpdateRequest"
      responses:
        "200":
          description: "Scopes have been successfully updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserScopesListResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}/data:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: ["Users"]
      operationId: "getUserData"
      summary: "Arbitrary user data"
      description: "Schemaless user data to be used by apps. Should not be used for anything related to security."
      responses:
        "200":
          description: "Current data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]
    post:
      tags: ["Users"]
      operationId: "setUserData"
      summary: "Set new data"
      description: "Override the arbitrary user data. There is no diff performed by the api server."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDataUpdateRequest"
      responses:
        "200":
          description: "User data has been successfully updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:write:all"]

  /api/v1/users/{userId}/data/history:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: ["Users"]
      operationId: "getUserDataHistory"
      summary: "History of arbitrary user data"
      description: "A list of all updates performed on the arbitrary user data."
      responses:
        "200":
          description: "History of user data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDataHistoryResponse"
        default:
          $ref: "#/components/responses/Error"
      security:
        - oAuth: ["users:read:all"]

components:
  securitySchemes:
    oAuth:
      type: oauth2
      description: >
        The project's main auth server:
        Auth can be granted using oAuth tokens (as seen below) or using long lived api-keys.
        Those are can be used like the access_token issued during the password or passwordless flows.
      flows:
        password:
          tokenUrl: "http://localhost:7435/auth/token"
          refreshUrl: "http://localhost:7435/auth/token"
          scopes:
            users:read:all: "Allow access to all users"
            users:write:all: "Allow modification of all users"
            invoices:read:all: "Allow access to all invoices"
            invoices:read:own: "Allow access to invoices created by the user/app"
            invoices:read:{eventId}: "Allow access to invoices associated with an event"
            invoices:write:all: "Allow modification of all invoices"
            invoices:write:own: "Allow modification of invoices created by the user/app"
            invoices:write:{eventId}: "Allow modification of invoices associated with an event"
            orders:read:all: "Allow access to all orders"
            orders:read:own: "Allow access to orders created by the user/app"
            orders:read:{eventId}: "Allow access to orders associated with an event"
            orders:write:all: "Allow modification of all orders"
            orders:write:own: "Allow modification of orders created by the user/app"
            orders:write:{eventId}: "Allow modification of orders associated with an event"
            events:read:all: "Allow access to all events"
            events:read:own: "Allow access to events created by the user/app"
            events:read:{eventId}: "Allow access to a specific event"
            events:write:all: "Allow modification of all events"
            events:write:own: "Allow modification of events created by the user/app"
            events:write:{eventId}: "Allow modification of a specific event"
            payments:read:all: "Allow access to all payments"
            payments:read:own: "Allow access to payments created by the user/app"
            payments:read:{eventId}: "Allow access to payments associated with an event"
            payments:write:all: "Allow modification of all payments"
            payments:write:own: "Allow modification of payments created by the user/app"
            payments:write:{eventId}: "Allow modification of payments associated with an event"
            emails:read:all: "Allow access to all emails"
            backend:read: "Read misc data necessary to access the backend"

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      description: "ID of the user"
      schema:
        type: string
        format: uuid
    UserAuthId:
      name: userAuthId
      in: path
      required: true
      description: "ID of the auth configuration"
      schema:
        type: string
        format: uuid

  responses:
    Error:
      description: "Error response"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AuthError:
      description: "Auth Error response"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthError"

  schemas:
    # Shared building blocks
    Locale:
      type: string
      enum: [de, en]

    Error:
      type: object
      description: "Standard error payload"
      required: [error]
      properties:
        code:
          type: number
          description: "Machine-readable error code, e.g. 'invalid_request'"
        error:
          type: string
          description: "Machine-readable error code, e.g. 'invalid_request'"
        message:
          type: string
          description: "Human-readable description"
        correlationId:
          type: string
          description: "ID of this error to correlate with log entries"
        details:
          type: object
          additionalProperties: true
          description: "Optional structured error context"

    AuthError:
      type: object
      description: "Auth error payload"
      required: [error]
      properties:
        error:
          type: string
          description: "Machine-readable error code, e.g. 'invalid_request'"
        error_description:
          type: string
          description: "Human-readable description"
        correlationId:
          type: string
          description: "ID of this error to correlate with log entries"

    # Auth
    AuthTokenRequest:
      type: object
      description: "OAuth token request"
      required: [grant_type]
      properties:
        grant_type:
          type: string
          enum:
            - password
            - refresh_token
            - "http://auth0.com/oauth/grant-type/passwordless/otp"
        username:
          type: string
        password:
          type: string
        otp:
          type: string
        refresh_token:
          type: string
        client_id:
          type: string
          description: "ID of the app or device to issue the token to, generated by the client"
        scope:
          type: string
          description: "Space-delimited list of requested scopes"

    AuthTokenResponse:
      type: object
      description: "OAuth token response"
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        scope:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          example: "Bearer"

    AuthRevokeRequest:
      type: object
      description: "Token revocation request"
      required: [token]
      properties:
        token:
          type: string
          description: "The refresh token to revoke"

    AuthUserinfoResponse:
      type: object
      description: "OIDC-style userinfo"
      properties:
        sub:
          type: string
        email:
          type: string
          format: email
        name:
          type: string

    AuthPasswordlessStartRequest:
      type: object
      description: "Start passwordless login"
      properties:
        client_id:
          type: string
          description: "ID of the app or device to issue the token to, generated by the client"
        connection:
          type: string
          enum: [email, sms]
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        send:
          type: string
          enum: [link, code]
        authParams:
          type: object
          description: "Additional auth parameters"
          required: [scope, locale]
          properties:
            scope:
              type: string
              description: "Space-delimited list of requested scopes"
            redirectUri:
              type: string
              description: "Page to redirect to, when using the send: link"
            locale:
              $ref: "#/components/schemas/Locale"

    AuthPasswordlessStartResponse:
      type: object
      description: "Opaque acknowledgement"
      properties:
        ok:
          type: boolean

    AuthPasswordResetStartRequest:
      type: object
      description: "Start password reset"
      required: [email, redirectUri, locale]
      properties:
        email:
          type: string
          format: email
        redirectUri:
          type: string
          description: "Page to redirect to, for setting the password"
        locale:
          $ref: "#/components/schemas/Locale"

    AuthPasswordResetStartResponse:
      type: object
      description: "Opaque acknowledgement"
      properties:
        ok:
          type: boolean

    AuthPasswordResetConfirmRequest:
      type: object
      description: "Confirm password reset"
      required: [email, code, password]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          format: email
          description: >
            The code provided sent to the user by /start endpoint.
            Currently sent as url parameter 'code'
        password:
          type: string
          format: password

    AuthPasswordResetConfirmResponse:
      type: object
      description: "Password reset result"
      properties:
        ok:
          type: boolean

    # Users
    User:
      type: object
      description: "A user"
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        title:
          type: string
        salutation:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    UserResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"

    UsersListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        # pagination is omitted to simplify UI loading patterns
        # may be added later
        # pagination:
        #   $ref: "#/components/schemas/Pagination"

    UsersCreateRequest:
      type: object
      description: "Create user payload"
      required: [email, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        title:
          type: string
        salutation:
          type: string
        firstName:
          type: string
        lastName:
          type: string

    UserUpdateRequest:
      type: object
      description: "Update user payload"
      properties:
        email:
          type: string
          format: email
        title:
          type: string
        salutation:
          type: string
        firstName:
          type: string
        lastName:
          type: string

    UserHistoryItem:
      type: object
      description: "An item in the users history"
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        changedBy:
          type: string
          description: "User ID or APP: user:userId or app:appKey"
        newState:
          type: object
          description: "The new state of the user record"
          properties:
            email:
              type: string
              format: email
            title:
              type: string
            salutation:
              type: string
            firstName:
              type: string
            lastName:
              type: string

    UserHistoryResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserHistoryItem"

    UserAuth:
      type: object
      description: "Auth configuration item"
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        method:
          type: string
          enum: [api-token, password, backup-code, passwordless, otp]
        secret:
          type: string
          description: >
            API-Key, Password, OTP-Secret or Backup-Code. Value may be hashed, omitted or opaque for security reasons.
            api-token: returned on creation can only be seen once
            password: is never returned
            backup-code: returned on creation can only be seen once
            passwordless: email or phone number bound to this login method, is returned plain
            otp: returned on creation can only be seen once
          nullable: true
        createdBy:
          type: string
          description: "User ID or APP: user:userId or app:appKey"
        createdReason:
          type: string
          enum: [user-request, password-reset, admin-request]
          description: "State why the auth method was set up"
        deletedBy:
          type: string
          description: "User ID or APP: user:userId or app:appKey"
        deletedReason:
          type: string
          enum: [user-request, password-reset, admin-request, code-used]
          description: "State why the auth method was set to inactive"
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    UserAuthResponse:
      $ref: "#/components/schemas/UserAuth"

    UserAuthListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserAuth"
        # pagination is omitted at current scale
        # may be added later
        # pagination:
        #   $ref: "#/components/schemas/Pagination"

    UserAuthCreateRequest:
      type: object
      description: "Setup an auth method for a user"
      required: [method]
      properties:
        method:
          type: string
          enum: [api-token, password, backup-code, passwordless, otp]
        secret:
          type: string
          description: "Password, if method is password, else omit"
          nullable: true

    UserScope:
      type: object
      description: "An item that describes a scope the user has or had access to"
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        scope:
          type: string
          description: The scope the user gets access by
        createdBy:
