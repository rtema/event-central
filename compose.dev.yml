# Local development stack.
#
# Brings up Postgres and MinIO, runs migrations once, then starts the web and
# queue handlers. The web port is published directly; a reverse proxy / TLS
# terminator will be added separately later.
#
#   docker compose up --build
#
# Scale the web tier horizontally:
#   docker compose up --scale web=3
#
# Run an ad-hoc backup / restore:
#   docker compose run --rm backup
#   docker compose run --rm cli restore --key backups/eventcentral-<ts>.dump
#
# Secrets are provided as files under ./secrets (dev placeholders included).
# In production, supply them via your orchestrator's secret store (the app
# reads any setting from /run/secrets/<field_name>).

name: event-central-dev

# Only non-sensitive configuration lives here; secrets are mounted as files.
x-app-env: &app-env
  ENVIRONMENT: development
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  S3_PRIMARY_ENDPOINT: http://minio:9000
  S3_PRIMARY_ACCESS_KEY: minioadmin
  S3_PRIMARY_BUCKET: event-central
  # OpenObserve log shipping (optional). Uncomment to enable; otherwise logs
  # are emitted as JSON on stdout for a collector to ship.
  # OPENOBSERVE_URL: http://openobserve:5080
  # OPENOBSERVE_ORGANIZATION: default
  # OPENOBSERVE_STREAM: event_central
  # OPENOBSERVE_TOKEN: <base64 user:password>

x-app-secrets: &app-secrets
  - db_password
  - storage_primary_user_key
  - storage_primary_user_secret
  - storage_secondary_user_key
  - storage_secondary_user_secret

secrets:
  db_password:
    file: ./secrets/db_password
  storage_root_key:
    file: ./secrets/storage_root_key
  storage_root_secret:
    file: ./secrets/storage_root_secret
  storage_primary_user_key:
    file: ./secrets/storage_primary_user_key
  storage_primary_user_secret:
    file: ./secrets/storage_primary_user_secret
  storage_secondary_user_key:
    file: ./secrets/storage_secondary_user_key
  storage_secondary_user_secret:
    file: ./secrets/storage_secondary_user_secret

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: event_central
      POSTGRES_DB: event_central
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 53542:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_central"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  storage-primary:
    image: rustfs/rustfs:latest # pin to a tested tag for reproducibility
    environment:
      RUSTFS_ADDRESS: "0.0.0.0:${storage_primary_port}"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:${storage_primary_console_port}"
      RUSTFS_CONSOLE_ENABLE: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export RUSTFS_ACCESS_KEY="$$(cat /run/secrets/storage_root_key)"
        export RUSTFS_SECRET_KEY="$$(cat /run/secrets/storage_root_secret)"
        exec rustfs /data
    ports:
      - "${storage_primary_port}:${storage_primary_port}"
      - "${storage_primary_console_port}:${storage_primary_console_port}"
    volumes:
      - storage-primary-data:/data
    secrets:
      - storage_root_key
      - storage_root_secret
    networks:
      - storage-backend
    restart: unless-stopped

  storage-secondary:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ADDRESS: "0.0.0.0:${storage_secondary_port}"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:${storage_secondary_console_port}"
      RUSTFS_CONSOLE_ENABLE: "true"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export RUSTFS_ACCESS_KEY="$$(cat /run/secrets/storage_root_key)"
        export RUSTFS_SECRET_KEY="$$(cat /run/secrets/storage_root_secret)"
        exec rustfs /data
    ports:
      - "${storage_secondary_port}:${storage_secondary_port}"
      - "${storage_secondary_console_port}:${storage_secondary_console_port}"
    volumes:
      - storage-secondary-data:/data
    secrets:
      - storage_root_key
      - storage_root_secret
    networks:
      - storage-backend
    restart: unless-stopped

  storage-init:
    build: ./storage/init
    depends_on:
      storage-primary:
        condition: service_started
      storage-secondary:
        condition: service_started
    environment:
      PRIMARY_ENDPOINT: "http://storage-primary:${storage_primary_port}"
      SECONDARY_ENDPOINT: "http://storage-secondary:${storage_secondary_port}"
      PRIMARY_CONSOLE: "http://localhost:${storage_primary_console_port}"
      SECONDARY_CONSOLE: "http://localhost:${storage_secondary_console_port}"
      BUCKETS: "event-central,invoices,backups"
    secrets:
      - storage_root_key
      - storage_root_secret
      - storage_primary_user_key
      - storage_primary_user_secret
      - storage_secondary_user_key
      - storage_secondary_user_secret
    networks:
      - storage-backend
  
  clamav:
    image: clamav/clamav:1.4 # official Cisco-Talos image; pin to a current patch
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav # persist the signature DB across restarts
      - ./clamav/clamd.conf:/etc/clamav/clamd.conf:ro # raises stream/file limits
    healthcheck:
      # clamdcheck.sh ships in the official image and pings clamd.
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 6m # first boot downloads + loads the signature DB (~minutes)
    # clamd holds the whole signature set in RAM (~1.5-2 GB) and cannot swap it.
    mem_limit: 3g
    # Expose to the host ONLY if you also scan from outside the compose network:
    ports:
      - "${clamd_port}:8080"

  validator-mustang:
    build:
      context: ./validator-mustang
      # Bump these two together to move to a newer engine; find the SHA at
      # https://repo1.maven.org/maven2/org/mustangproject/Mustang-CLI/
      args:
        MUSTANG_VERSION: "2.24.0"
        MUSTANG_SHA256: "e4904ffa0afdce3f5836dceb927c440a05ed5d60386fdd37e17a4b2f7652edbf"
    image: mustang-validator:2.24.0
    restart: unless-stopped
    ports:
      - "${validator_mustang_port}:8080"
    environment:
      JAVA_MEM: "1G"
      MAX_CONCURRENCY: "1"     # keep small: each validation is a fresh JVM
      VALIDATE_TIMEOUT: "120"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          # veraPDF + JVM: give it headroom above JAVA_MEM.
          memory: 2g
  validator-kosit:
    profiles: ["strict"]
    build:
      context: ./validator-kosit
      # Bump these to move to newer official releases (find checksums next to the
      # assets on the itplr-kosit GitHub releases pages).
      args:
        KOSIT_VALIDATOR_VERSION: "1.6.2"
        KOSIT_VALIDATOR_SHA256: "244978514ad48f67c7573acfffc8f4fd73d81feda6f276710033f9913579857e"
        XR_CONFIG_DATE: "2026-01-31"
        XR_CONFIG_XR_VERSION: "3.0.2"
        XR_CONFIG_SHA256: "6a5a5911a421b25fbc423f62f93f894df7b236f5d73ca4f84bb222a945082704"
    image: kosit-xrechnung:1.6.2-2026-01-31
    restart: unless-stopped
    ports:
      - "${validator_kosit_port}:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/server/health"]
      interval: 30s
      timeout: 5s
      start_period: 45s
      retries: 5


networks:
  storage-backend:

volumes:
  db-data:
  storage-primary-data:
  storage-secondary-data:
  clamav-data:
