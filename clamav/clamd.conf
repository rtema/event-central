# Mounted at /etc/clamav/clamd.conf in the clamav container. This REPLACES the
# image's default config, so the socket directives must be present. Anything
# not listed here uses clamd's built-in defaults.

# --- Network socket: the app connects here (clamav:3310) ---
TCPSocket 3310
TCPAddr 0.0.0.0

# --- Unix socket: the image's startup/readiness check and freshclamd
#     both wait for this file. clamd never creates it unless you name it. ---
LocalSocket /run/clamav/clamd.sock
LocalSocketGroup clamav
LocalSocketMode 660

# --- Logging to stdout/stderr so `docker logs clamav` works ---
LogTime yes
LogFileMaxSize 0
LogVerbose no

# --- Size limits --------------------------------------------------------------
# These MUST be >= the app's MAX_FILE_SIZE (50 MiB). If StreamMaxLength is too
# small, clamd aborts the INSTREAM with a size-limit error; if MaxFileSize is
# too small, clamd SKIPS the file and reports it clean without scanning. Both
# are set above the app cap with headroom. MaxScanSize covers the total bytes
# scanned including decompressed archive contents, so keep it larger.
StreamMaxLength 60M
MaxFileSize 60M
MaxScanSize 300M

# --- Heuristics: surface common malicious document/archive patterns ----------
AlertOLE2Macros yes
# AlertEncrypted yes        # treat encrypted archives/docs as suspicious
# AlertBrokenExecutables yes

# --- Concurrency / timeouts (defaults shown; tune to your load) ---------------
MaxThreads 12
ReadTimeout 120